name: Assign Issue to Copilot
# This workflow is triggered when an issue is labeled
on:
  issues:
    types:
      - labeled

# This workflow needs permission to modify issues
permissions:
  issues: write

# This workflow contains one job: assign_copilot_user
jobs:
  assign_copilot_user:
    name: Assign issue to copilot
    runs-on: ubuntu-latest
    if: github.event.label.name == 'copilot'
    steps:
      # This step assigns the issue to the copilot user
      - name: Assign issue to copilot
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issueNumber = context.issue.number;

            const candidates = await github.paginate(github.rest.issues.listAssignees, {
              owner,
              repo,
              per_page: 100,
            });

            const copilotAssignee = candidates.find((user) =>
              /copilot/i.test(user.login) || /copilot/i.test(user.name || '')
            );

            if (!copilotAssignee) {
              core.setFailed(
                'No assignable Copilot account found in this repository. Confirm Copilot coding agent is enabled and assignable.'
              );
              return;
            }

            core.info(`Assigning issue to ${copilotAssignee.login}`);

            const response = await github.rest.issues.addAssignees({
              owner,
              repo,
              issue_number: issueNumber,
              assignees: [copilotAssignee.login],
            });

            const assigned = response.data.assignees.some(
              (a) => a.login.toLowerCase() === copilotAssignee.login.toLowerCase()
            );

            if (!assigned) {
              core.setFailed(
                `Failed to assign ${copilotAssignee.login} to issue even though it appears assignable.`
              );
            }
