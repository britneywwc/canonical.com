name: Assign Issue to Copilot
# This workflow is triggered when an issue is labeled
on:
  issues:
    types:
      - labeled

# Read access is needed for gh to resolve the repository
permissions:
  contents: read
  issues: write

# This workflow contains one job: assign_copilot_user
jobs:
  assign_copilot_user:
    name: Assign issue to copilot
    runs-on: ubuntu-latest
    if: github.event.label.name == 'copilot'
    steps:
      # Start a Copilot cloud agent session referencing this issue.
      # Requires a PAT with repo + Copilot agent permissions stored as COPILOT_TOKEN.
      - name: Start Copilot agent task for issue
        env:
          COPILOT_TOKEN: ${{ secrets.COPILOT_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          REPO: ${{ github.repository }}
        run: |
          # Store token in gh credential store (GH_TOKEN must not be set while doing this)
          echo "$COPILOT_TOKEN" | gh auth login --with-token

          # Truncate body to 2000 chars to avoid excessively long prompts
          PROMPT="Work on issue #${ISSUE_NUMBER}: ${ISSUE_TITLE}

          ${ISSUE_BODY:0:2000}"

          gh agent-task create \
            --repo "$REPO" \
            "$PROMPT"
